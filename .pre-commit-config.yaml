default_language_version:
  python: python3.11

default_stages: [commit]

# Vendored, generated, and historical files excluded from automatic fixes.
exclude: |
  (?x)^(
    docs/|
    (^|.*/)migrations/|
    (^|.*/)devcontainer\.json$|
    \.git/|
    \.eggs/|
    (^|.*/)node_modules/|
    (^|.*/)\.next/|
    (^|.*/)build/|
    (^|.*/)dist/|
    (^|.*/)staticfiles/|
    AlertaDengue/admin/js/|
    AlertaDengue/static/libs/|
    AlertaDengue/static/js/highstock-all\.js$|
    AlertaDengue/static/cap_sms\.geojson$|
    AlertaDengue/static/img/reports/enso\.svg$|
    containers/postgres/sql_history/|
    (^|.*/).*\.min\.js$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^LICENSE$
      - id: end-of-file-fixer
        exclude: ^LICENSE$
      - id: check-json
        exclude: ^(notebooks/DB_DEMO\.ipynb|AlertaDengue/templates/manifest\.json)$
      - id: check-toml
      - id: check-xml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      # These hooks are intentionally manual during the phased lint rollout.
      # Run them explicitly with:
      #   pre-commit run <hook-id> --hook-stage manual
      - id: check-docstring-first
        stages: [manual]
      - id: detect-private-key

  - repo: local
    hooks:
      - id: djlint-reformat-django
        name: djLint reformat (Django)
        entry: poetry run djlint --reformat --profile=django
        language: system
        files: ^AlertaDengue/dados/templates/.*\.html$
        exclude: ^AlertaDengue/dados/templates/components/tutorial/notebook-API-(Python|R)-en\.html$
        stages: [manual]

      - id: djlint-django
        name: djLint check (Django)
        entry: poetry run djlint --check --profile=django
        language: system
        files: ^AlertaDengue/dados/templates/.*\.html$
        exclude: ^AlertaDengue/dados/templates/components/tutorial/notebook-API-(Python|R)-en\.html$
        stages: [manual]

      - id: ruff-format
        name: Ruff format
        entry: poetry run ruff format
        language: system
        files: ^AlertaDengue/.*\.py$
        pass_filenames: true

      - id: ruff-linter
        name: Ruff lint
        entry: poetry run ruff check
        language: system
        files: ^AlertaDengue/.*\.py$
        pass_filenames: true

      - id: bandit
        name: Bandit
        entry: poetry run bandit --configfile pyproject.toml -iii -lll -r AlertaDengue
        language: system
        files: ^AlertaDengue/.*\.py$
        pass_filenames: false

      - id: vulture
        name: Vulture
        entry: poetry run python scripts/run-vulture.py
        language: system
        files: ^AlertaDengue/.*\.py$
        pass_filenames: false
        stages: [manual]

      - id: mccabe
        name: McCabe
        entry: poetry run python -m mccabe --min 25
        language: system
        files: ^AlertaDengue/(ad_main|api|dados|ingestion|manager)/.*\.py$
        pass_filenames: true

      - id: mypy
        name: mypy
        entry: bash scripts/run-mypy-precommit.sh
        language: system
        files: ^AlertaDengue/.*\.py$
        pass_filenames: false

      - id: prettier
        name: Prettier
        entry: bash scripts/run-prettier-precommit.sh
        language: system
        files: ^frontend/(src/.*\.(ts|tsx|css)|.*\.(json|mjs))$
        pass_filenames: true

      - id: eslint
        name: ESLint
        entry: npm --prefix frontend run lint
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|mjs)$
        pass_filenames: false

      - id: tsc
        name: TypeScript
        entry: npm --prefix frontend run typecheck
        language: system
        files: ^frontend/.*\.(ts|tsx|mts)$
        pass_filenames: false
