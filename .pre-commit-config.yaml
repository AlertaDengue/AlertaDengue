default_language_version:
  python: python3.11

default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.5.0
    hooks:
      - id: end-of-file-fixer
        exclude: LICENSE

  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        files: ""
        exclude: ^$
        types: [python, file, python]
        stages: [pre-commit]
        pass_filenames: true
        args: ["--line-length", "79"]

      - id: isort
        name: isort
        entry: isort
        language: system
        files: ""
        exclude: ^.*/js/.*$
        types: [python]
        stages: [pre-commit]
        pass_filenames: true
        args: ["--profile", "black", "-l", "79"]
