backend: bash
env-files: .envs/.env
groups:

  clean:
    tasks:
      tmp:
        help: remove build artifacts, compiled files, and cache
        backend: bash
        run: |
          find . -name '*.egg-info' -exec rm -rf {} +
          find . -name '*.egg' -exec rm -f {} +
          find . -name '*.pyc' -exec rm -f {} +
          find . -name '*.pyo' -exec rm -f {} +
          find . -name '__pycache__' -exec rm -rf {} +
          find . -name '*~' -exec rm -f {} +
          rm -rf build/
          rm -rf dist/
          rm -rf .eggs/
          rm -f .coverage
          rm -rf htmlcov/
          rm -rf .pytest_cache
          rm -rf .mypy_cache
          rm -rf .ruff_cache
          rm -rf .cache/
          find . -name "*.pyc" -delete
          echo "[II] Cleaned temporary files."
  # DJANGO
  django:
    help: Run Django commands and manage the development server.
    env:
      sugar_run_rm: sugar run --service web --options --rm
      manage_py: python manage.py
    tasks:
      # DEV MODE
      run:
        help: Start the development server locally.
        args:
          subcommand:
            help: Specify a Django subcommand to run.
            type: string
            default: runserver
        run: |
          cd AlertaDengue &&
          ${{ env.manage_py }} ${{ args.subcommand }}

      shell:
        help: Run the Django console interpreter inside the container.
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
        run: |
          sugar compose-ext start --services web --options -d
          python AlertaDengue/manage.py shell


      # CONTAINER
      collectstatic:
        help: Run the collectstatic for the backend service
        run: |
          CMD="python manage.py collectstatic --no-input"

          sugar --profile ${{ env.ENV }} compose-ext start \
            --services postgres --options -d

          CMD="python manage.py collectstatic --no-input"
          sugar --profile ${{ env.ENV }}  compose-ext exec --service web --cmd "$CMD"
          echo "[II] postgres is running."

      static-geofiles:
        help: Generate geojson files and save them in the staticfiles folder.
        run: |
          ${{ env.sugar_run_rm }} --entrypoint "/opt/entrypoint.sh" --cmd ${{ env.manage_py }} sync_geofiles

      makemigrations:
        help: Run django makemigrations command (just for development)
        args:
          check:
            help: |
              Just check if the latest migration files were already created.
            type: bool
            action: store_true
        run: |
          sugar --profile ${{ env.ENV }} compose-ext start \
            --services postgres --options -d

          CWD=$(pwd)
          CMD_FLAG="${{ '--check' if args.check else '' }} --no-input"

          for app in 'dados'; do
            echo -e "\nMaking migration files for: '${app}' ...\n"

            CMD="python manage.py makemigrations ${CMD_FLAG} ${app}"

            sugar --profile ${{ env.ENV }} compose-ext run --rm --service web \
              --cmd "$CMD"

            echo "[II] postgres is running."


          done

          echo "[II] postgres is running."

      migrate:
        help: Migrate regarding to the current migration files
        run: |
          sugar --profile ${{ env.ENV }} compose-ext start \
            --services postgres --options -d

          CMD="python manage.py migrate --no-input"
          sugar --profile ${{ env.ENV }} compose-ext run --rm --service web \
           --cmd "$CMD"

          echo "[II] postgres is running."


      send-mail-partner:
        help: Send email to partners.
        run: |
          ${{ env.sugar_run_rm }} --cmd ${{ env.manage_py }} send_mail


      backfill-chik-casprov:
        help: Copy a chik parquet file into the running web container and run the one-time backfill command.
        args:
          parquet-path:
            help: Host path to chik_fill.parquet.
            type: string
          container-path:
            help: Destination path inside the web container.
            type: string
            default: /tmp/chik_fill.parquet
          apply:
            help: Apply the update instead of running only the diagnostics.
            type: bool
            action: store_true
        run: |
          sugar --profile ${{ env.ENV }} compose-ext start \
            --services postgres web --options -d

          COMPOSE_FILE="containers/compose-${ENV}.yaml"
          PROJECT_NAME="infodengue-${ENV}"
          COMPOSE_CMD="docker compose --env-file .envs/.env \
            --file containers/compose-base.yaml \
            --file ${COMPOSE_FILE} \
            --project-name ${PROJECT_NAME}"

          WEB_CID=$($COMPOSE_CMD ps -q web)

          if [ -z "$WEB_CID" ]; then
            echo "[EE] web container not found."
            exit 1
          fi

          docker cp "${{ args.parquet_path }}" \
            "${WEB_CID}:${{ args.container_path }}"

          CMD="python manage.py backfill_chik_casprov \
          --parquet-path ${{ args.container_path }} \
          ${{ '--apply' if args.apply else '' }}"

          sugar --profile ${{ env.ENV }} compose-ext exec \
            --service web --cmd "$CMD"

  # TESTS
  tests:
    help: Test tasks (dbdata TDD slice)
    tasks:
      setup:
        help: Setup infra for tests
        run: |
          sugar --profile dev compose-ext start --services postgres --options -d
          makim develop.container-wait --service postgres --timeout 90

      teardown:
        help: Teardown infra for tests
        run: |
          sugar --profile dev compose-ext stop

      lint:
        help: Run linter tools
        hooks:
          pre-run:
            - task: clean.tmp
        run: |
          pre-commit install
          pre-commit run --all-files --verbose

      typecheck:
        help: Run mypy (best-effort, skip third-party imports)
        run: |
          mypy --follow-imports=skip --ignore-missing-imports \
            AlertaDengue/tests/dados/

      unit:
        help: Run tests with pytest (inside web container)
        args:
          path:
            help: Path or module to run (e.g., tests/dbdata)
            type: string
            default: "tests/"
          settings:
            help: Django settings module
            type: string
            default: "ad_main.settings.testing"
          params:
            help: Additional pytest params
            type: string
            default: "-vv"
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
        hooks:
          pre-run:
            - task: tests.setup
          post-run:
            - task: tests.teardown
        run: |
          TTY_OPT=""
          if [ ! -t 0 ]; then
            TTY_OPT="-T"
          fi

          CMD="PYTHONPATH=/opt/services/AlertaDengue \
            DJANGO_SETTINGS_MODULE=${{ args.settings }} \
            PGOPTIONS='-c search_path=test_views,public' \
            pytest -q ${{ args.path }} ${{ args.params }}"

          sugar --profile dev compose-ext run --rm --service web \
            --options "$TTY_OPT" \
            --cmd "sh -lc \"$CMD\""

  develop:
    help: Development tasks and utilities.
    env:
      manage_py: python AlertaDengue/manage.py
    tasks:
      # CI
      container-wait:
        help: Wait for a specific service to become available.
        args:
          timeout:
            help: Define the timeout in seconds for the health check.
            type: string
            default: "30"
          service:
            help: Specify the name of the service to wait for.
            type: string
            required: true
        run: |
          timeout ${{ args.timeout }} ./containers/scripts/healthcheck.sh ${{ args.service }}

      container-wait-all:
        help: Wait until container is healthy
        args:
          timeout:
            help: the time (in seconds) for waiting the service
            type: string
            default: "90"
            required: false
        hooks:
          pre-run:
            - task: develop.container-wait
              args:
                timeout: ${{ args.timeout }}
                service: postgres
            - task: develop.container-wait
              args:
                timeout: ${{ args.timeout }}
                service: memcached
            - task: develop.container-wait
              args:
                timeout: ${{ args.timeout }}
                service: rabbitmq
            - task: develop.container-wait
              args:
                timeout: ${{ args.timeout }}
                service: web
            - task: develop.container-wait
              args:
                timeout: ${{ args.timeout }}
                service: celery
            - task: develop.container-wait
              args:
                timeout: ${{ args.timeout }}
                service: frontend

      clean:
        help: Clean all generated artifacts from the project.
        hooks:
          pre-run:
            - task: develop.clear_cache
        args:
          path:
            help: Specify the path of the files to remove.
            type: string
            default: ""
        run: |
          import shutil
          from pathlib import Path
          base_dir = Path(".")
          list_to_cache_files = [
            'build/', 'dist/', '.eggs/', '*/.eggs', 'db',
            '*.egg-info', '*.egg', '*.pyc', '*.pyo', '*~',
            '__pycache__', '*.ipynb_checkpoints', '*.pytest_cache'
          ]
          for item in list_to_cache_files:
            for file in base_dir.glob(f'**/{item}'):
              shutil.rmtree(file) if file.is_dir() else file.unlink()
      clear_cache:
        help: Clear all Django cache
        args:
          subcommand:
            help: Specify a Django subcommand to run.
            type: string
            default: clearcache
        run: |
          ${{ env.manage_py }} ${{ args.subcommand }}

  ingestion:
    help: SINAN ingestion pipeline (host-side, Strategy A).
    env:
      manage_py: python AlertaDengue/manage.py
      ingestion_host_base: "${DOCKER_HOST_IMPORTED_FILES_DIR}"
      ingestion_worker_base: "/opt/services/ingestion/sinan/imported"
    tasks:
      move:
        help: Move CSV/DBF files to canonical imported path.
        args:
          paths:
            help: Files or directories to process.
            type: string
            required: true
          imported-base:
            help: Destination base directory.
            type: string
            default: ""
          manifest:
            help: Write a JSON manifest of moved files to this path.
            type: string
            default: ""
          dry-run:
            help: Print planned actions without moving.
            type: bool
            action: store_true
          include-uf:
            help: Include UF folder layer when available.
            type: bool
            action: store_true
          country:
            help: Override country code (e.g. br, es).
            type: string
            default: ""
          on-exists:
            help: "Collision policy: version, skip, or error."
            type: string
            default: version
          include-existing:
            help: Include files in manifest even if they were already moved.
            type: bool
            action: store_true
          epiweek-window:
            help: Skip files older than this number of weeks.
            type: string
            default: "58"
          allow-outdated:
            help: Ingest even if the file is older than the window.
            type: bool
            action: store_true
        run: |
          IMPORTED_BASE=${{ args.imported_base }}
          if [ -z "$IMPORTED_BASE" ]; then
            IMPORTED_BASE="${{ env.DOCKER_HOST_IMPORTED_FILES_DIR }}"
          fi

          FLAGS=""
          FLAGS="$FLAGS --imported-base $IMPORTED_BASE"
          if [ -n "${{ args.manifest }}" ]; then
            FLAGS="$FLAGS --manifest ${{ args.manifest }}"
          fi
          if [ "${{ args.dry_run }}" = "True" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ "${{ args.include_uf }}" = "True" ]; then
            FLAGS="$FLAGS --include-uf"
          fi
          if [ -n "${{ args.country }}" ]; then
            FLAGS="$FLAGS --country ${{ args.country }}"
          fi
          if [ "${{ args.include_existing }}" = "True" ]; then
            FLAGS="$FLAGS --include-existing"
          fi
          if [ -n "${{ args.epiweek_window }}" ]; then
            FLAGS="$FLAGS --epiweek-window ${{ args.epiweek_window }}"
          fi
          if [ "${{ args.allow_outdated }}" = "True" ]; then
            FLAGS="$FLAGS --allow-outdated"
          fi
          FLAGS="$FLAGS --on-exists ${{ args.on_exists }}"

          python AlertaDengue/ingestion/management/commands/mover_sinan_data.py \
            "${{ args.paths }}" \
            --imported-base $IMPORTED_BASE \
            $FLAGS

      enqueue:
        help: Create a Run record and enqueue Celery processing.
        hooks:
          pre-run:
            - task: develop.container-wait
              args:
                service: postgres
                timeout: "30"
            - task: develop.container-wait
              args:
                service: rabbitmq
                timeout: "30"
        args:
          source-path:
            help: Path to the source file (CSV/DBF/Parquet).
            type: string
            required: true
          uf:
            help: UF code (e.g. ES, BR).
            type: string
            required: true
          disease:
            help: CID10 disease code (e.g. A90, A92).
            type: string
            required: true
          year:
            help: Delivery year.
            type: string
            required: true
          week:
            help: Delivery epidemiological week.
            type: string
            required: true
          requeue:
            help: Re-enqueue even if run already exists.
            type: bool
            action: store_true
        env:
          PSQL_HOST: "localhost"
          PSQL_PORT: "${{ env.PSQL_PORT }}"
          CELERY_BROKER_URL: "${{ env.CELERY_BROKER_URL }}"
        run: |
          FLAGS=""
          if [ "${{ args.requeue }}" = "True" ]; then
            FLAGS="$FLAGS --requeue"
          fi
          if [ -n "${{ env.ingestion_host_base }}" ]; then
            FLAGS="$FLAGS --host-base ${{ env.ingestion_host_base }}"
            FLAGS="$FLAGS --worker-base ${{ env.ingestion_worker_base }}"
          fi

          cd AlertaDengue &&
          python manage.py ingestion_enqueue_sinan \
            "${{ args.source_path }}" \
            --uf "${{ args.uf }}" \
            --disease "${{ args.disease }}" \
            --year "${{ args.year }}" \
            --week "${{ args.week }}" \
            $FLAGS

      enqueue-manifest:
        help: Read a manifest and enqueue runs in priority order (ES < BR, earlier weeks first).
        hooks:
          pre-run:
            - task: develop.container-wait
              args:
                service: postgres
                timeout: "30"
            - task: develop.container-wait
              args:
                service: rabbitmq
                timeout: "30"
        args:
          manifest:
            help: Path to the JSON manifest from mover_sinan_data.py.
            type: string
            required: true
          requeue:
            help: Re-enqueue even if run already exists.
            type: bool
            action: store_true
          dry-run:
            help: Print the sorted plan without enqueuing.
            type: bool
            action: store_true
        env:
          PSQL_HOST: "localhost"
          PSQL_PORT: "${{ env.PSQL_PORT }}"
          CELERY_BROKER_URL: "${{ env.CELERY_BROKER_URL }}"
        run: |
          FLAGS=""
          if [ "${{ args.requeue }}" = "True" ]; then
            FLAGS="$FLAGS --requeue"
          fi
          if [ "${{ args.dry_run }}" = "True" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ env.ingestion_host_base }}" ]; then
            FLAGS="$FLAGS --host-base ${{ env.ingestion_host_base }}"
            FLAGS="$FLAGS --worker-base ${{ env.ingestion_worker_base }}"
          fi

          cd AlertaDengue &&
          python manage.py ingestion_enqueue_manifest \
            --manifest "${{ args.manifest }}" \
            $FLAGS

      run:
        help: Full pipeline — move files then enqueue via manifest.
        hooks:
          pre-run:
            - task: develop.container-wait
              args:
                service: postgres
                timeout: "30"
            - task: develop.container-wait
              args:
                service: rabbitmq
                timeout: "30"
        args:
          paths:
            help: Files or directories to move.
            type: string
            required: true
          imported-base:
            help: Destination base directory.
            type: string
            default: ""
          dry-run:
            help: Print planned actions without executing.
            type: bool
            action: store_true
          requeue:
            help: Re-enqueue even if run already exists.
            type: bool
            action: store_true
          include-existing:
            help: Include files in manifest even if they were already moved.
            type: bool
            action: store_true
          epiweek-window:
            help: Skip files older than this number of weeks.
            type: string
            default: "58"
          allow-outdated:
            help: Ingest even if the file is older than the window.
            type: bool
            action: store_true
        env:
          PSQL_HOST: "localhost"
          PSQL_PORT: "${{ env.PSQL_PORT }}"
          CELERY_BROKER_URL: "${{ env.CELERY_BROKER_URL }}"
        run: |
          IMPORTED_BASE=${{ args.imported_base }}
          if [ -z "$IMPORTED_BASE" ]; then
            IMPORTED_BASE="${{ env.DOCKER_HOST_IMPORTED_FILES_DIR }}"
          fi

          MANIFEST_FILE=$(mktemp --suffix=.json)

          MOVE_FLAGS=""
          MOVE_FLAGS="$MOVE_FLAGS --imported-base $IMPORTED_BASE"
          if [ "${{ args.dry_run }}" = "True" ]; then
            MOVE_FLAGS="$MOVE_FLAGS --dry-run"
          fi
          MOVE_FLAGS="$MOVE_FLAGS --manifest $MANIFEST_FILE"

          echo "── Phase 1: Moving files ──"
          if [ "${{ args.include_existing }}" = "True" ]; then
            MOVE_FLAGS="$MOVE_FLAGS --include-existing"
          fi
          if [ -n "${{ args.epiweek_window }}" ]; then
            MOVE_FLAGS="$MOVE_FLAGS --epiweek-window ${{ args.epiweek_window }}"
          fi
          if [ "${{ args.allow_outdated }}" = "True" ]; then
            MOVE_FLAGS="$MOVE_FLAGS --allow-outdated"
          fi
          python AlertaDengue/ingestion/management/commands/mover_sinan_data.py \
            "${{ args.paths }}" $MOVE_FLAGS

          if [ "${{ args.dry_run }}" = "True" ]; then
            echo "Dry-run mode — skipping enqueue."
            cat "$MANIFEST_FILE"
            # rm -f "$MANIFEST_FILE"
            exit 0
          fi

          ENQUEUE_FLAGS=""
          if [ "${{ args.requeue }}" = "True" ]; then
            ENQUEUE_FLAGS="$ENQUEUE_FLAGS --requeue"
          fi
          if [ -n "${{ env.ingestion_host_base }}" ]; then
            ENQUEUE_FLAGS="$ENQUEUE_FLAGS --host-base ${{ env.ingestion_host_base }}"
            ENQUEUE_FLAGS="$ENQUEUE_FLAGS --worker-base ${{ env.ingestion_worker_base }}"
          fi

          echo "── Phase 2: Enqueueing from manifest ──"
          cd AlertaDengue &&
          python manage.py ingestion_enqueue_manifest \
            --manifest "$MANIFEST_FILE" \
            $ENQUEUE_FLAGS

          if [ ! -s "$MANIFEST_FILE" ]; then
            echo "[WW] Manifest is empty after Phase 1. If files were skipped because they already exist, use --include-existing to force re-ingestion/manifest inclusion."
          fi
          rm -f "$MANIFEST_FILE"

      remerge:
        help: Rerun the merge phase for a specific run_id (useful after staging fixes or transient errors).
        args:
          run-id:
            help: Run UUID to re-merge.
            type: string
            required: true
        env:
          PSQL_HOST: "localhost"
          PSQL_PORT: "${{ env.PSQL_PORT }}"
        run: |
          cd AlertaDengue &&
          python manage.py shell -c "from ingestion.tasks import sinan_merge_run; res = sinan_merge_run('${{ args.run_id }}'); print(f'Merge completed: {res}')"

      watch:
        help: Watch a directory for new SINAN files and trigger ingestion.
        args:
          path:
            help: Directory to watch.
            type: string
            default: ""
          settle-time:
            help: Wait N seconds after last modification to ensure upload is finished.
            type: string
            default: "5.0"
          requeue:
            help: Re-enqueue even if run already exists.
            type: bool
            action: store_true
          include-existing:
            help: Include files in manifest even if they were already moved.
            type: bool
            action: store_true
        run: |

          INCOMING_DIR="${{ args.path }}"
          if [ -z "$INCOMING_DIR" ]; then
            INCOMING_DIR="${{ env.DOCKER_HOST_INCOMING_DIR }}"
          fi

          FLAGS=""
          if [ "${{ args.requeue }}" = "True" ]; then
            FLAGS="$FLAGS --requeue"
          fi
          if [ "${{ args.include_existing }}" = "True" ]; then
            FLAGS="$FLAGS --include-existing"
          fi

          python AlertaDengue/ingestion/management/commands/ingestion_watcher.py \
            --path "${INCOMING_DIR}" \
            --settle-time '${{ args.settle_time }}' \
            $FLAGS

      watch-start:
        help: Start ingestion watcher in background (env/path aware).
        args:
          env:
            help: Target environment (prod, staging, dev).
            type: string
            default: ""
          path:
            help: Override incoming path.
            type: string
            default: ""
          settle-time:
            help: Wait N seconds after last modification.
            type: string
            default: "5.0"
          include-existing:
            help: Include skipped files in manifest.
            type: bool
            action: store_true
          requeue:
            help: Re-enqueue even if run already exists.
            type: bool
            action: store_true
          log-file:
            help: Override log file path.
            type: string
            default: ""
          pid-file:
            help: Override pid file path.
            type: string
            default: ""
          replace:
            help: Stop existing watchers for the target path first.
            type: bool
            action: store_true
        run: |
          set -eu

          INCOMING_DIR="${{ args.path }}"
          LOG_FILE="${{ args.log_file }}"
          PID_FILE="${{ args.pid_file }}"

          if [ -z "${INCOMING_DIR}" ] && [ -n "${{ args.env }}" ]; then
            INCOMING_DIR="${DOCKER_HOST_INCOMING_DIR:-}"
            [ -z "${LOG_FILE}" ] && \
              LOG_FILE="${DOCKER_HOST_LOG_DIR:-/tmp}/ingestion_watch.log"
          fi

          if [ -z "${INCOMING_DIR}" ]; then
            INCOMING_DIR="${DOCKER_HOST_INCOMING_DIR:-}"
          fi

          if [ -z "${LOG_FILE}" ]; then
            LOG_FILE="${DOCKER_HOST_LOG_DIR:-/tmp}/ingestion_watch.log"
          fi

          if [ -z "${PID_FILE}" ]; then
            PID_FILE="${LOG_FILE}.pid"
          fi

          if [ -z "${INCOMING_DIR}" ]; then
            echo "[EE] no incoming dir resolved (use --env or --path)"
            exit 2
          fi

          mkdir -p "$(dirname "${LOG_FILE}")"

          PATTERN="AlertaDengue/ingestion/management/commands/ingestion_watcher.py"
          PIDS="$(pgrep -f "${PATTERN}.*--path ${INCOMING_DIR}(/)?( |$)" || true)"

          if [ -n "${PIDS}" ] && [ "${{ args.replace }}" != "True" ]; then
            echo "[WW] watcher already running for path=${INCOMING_DIR}"
            echo "${PIDS}"
            exit 1
          fi

          if [ -n "${PIDS}" ] && [ "${{ args.replace }}" = "True" ]; then
            echo "[II] stopping existing watchers for path=${INCOMING_DIR}"
            kill -TERM ${PIDS} || true
            sleep 2
          fi

          FLAGS=""
          [ "${{ args.requeue }}" = "True" ] && FLAGS="$FLAGS --requeue"
          [ "${{ args.include_existing }}" = "True" ] && \
            FLAGS="$FLAGS --include-existing"

          CMD="python AlertaDengue/ingestion/management/commands/ingestion_watcher.py \
            --path '${INCOMING_DIR}' \
            --settle-time '${{ args.settle_time }}' \
            ${FLAGS}"

          nohup sh -lc "${CMD}" >> "${LOG_FILE}" 2>&1 &
          echo $! > "${PID_FILE}"

          echo "[II] watcher started pid=$(cat "${PID_FILE}")"
          echo "[II] log=${LOG_FILE}"

      watch-ps:
        help: List host-side ingestion watcher processes (optionally by env/path).
        args:
          env:
            help: Filter by environment (prod, staging, dev).
            type: string
            default: ""
          path:
            help: Filter by incoming path.
            type: string
            default: ""
        run: |
          set -eu

          INCOMING_DIR="${{ args.path }}"

          if [ -z "${INCOMING_DIR}" ] && [ -n "${{ args.env }}" ]; then
            INCOMING_DIR="${DOCKER_HOST_INCOMING_DIR:-}"
          fi

          PATTERN="AlertaDengue/ingestion/management/commands/ingestion_watcher.py"

          if [ -n "${INCOMING_DIR}" ]; then
            echo "[II] watchers for path=${INCOMING_DIR}"
            pgrep -af "${PATTERN}.*--path ${INCOMING_DIR}(/)?( |$)" || true
            exit 0
          fi

          echo "[II] all watchers"
          pgrep -af "${PATTERN}" || true

      watch-stop:
        help: Stop host-side ingestion watcher for an env/path.
        args:
          env:
            help: Target environment (prod, staging, dev). Overrides .env.
            type: string
            default: ""
          path:
            help: Override incoming path.
            type: string
            default: ""
          signal:
            help: Signal to send first (TERM or INT).
            type: string
            default: TERM
          force:
            help: Send SIGKILL after a short wait.
            type: bool
            action: store_true
        run: |
          set -eu

          INCOMING_DIR="${{ args.path }}"

          if [ -z "${INCOMING_DIR}" ] && [ -n "${{ args.env }}" ]; then
            INCOMING_DIR="${DOCKER_HOST_INCOMING_DIR:-}"
          fi

          if [ -z "${INCOMING_DIR}" ]; then
            INCOMING_DIR="${DOCKER_HOST_INCOMING_DIR:-}"
          fi

          if [ -z "${INCOMING_DIR}" ]; then
            echo "[EE] no incoming dir resolved (use --env or --path)"
            exit 2
          fi

          PATTERN="AlertaDengue/ingestion/management/commands/ingestion_watcher.py"
          PIDS="$(pgrep -f "${PATTERN}.*--path ${INCOMING_DIR}(/)?( |$)" || true)"

          if [ -z "${PIDS}" ]; then
            echo "[II] no watchers for path=${INCOMING_DIR}"
            exit 0
          fi

          echo "[II] stopping watchers path=${INCOMING_DIR} pids=${PIDS}"
          kill "-${{ args.signal }}" ${PIDS} || true

          if [ "${{ args.force }}" = "True" ]; then
            sleep 2
            PIDS2="$(pgrep -f "${PATTERN}.*--path ${INCOMING_DIR}(/)?( |$)" || true)"
            if [ -n "${PIDS2}" ]; then
              echo "[WW] forcing kill pids=${PIDS2}"
              kill -KILL ${PIDS2} || true
            fi
          fi

  release:
    env:
      app: |
        npx --yes \
          -p semantic-release \
          -p conventional-changelog-conventionalcommits \
          -p "@semantic-release/commit-analyzer" \
          -p "@semantic-release/release-notes-generator" \
          -p "@semantic-release/changelog" \
          -p "@semantic-release/exec" \
          -p "@semantic-release/github" \
          -p "@semantic-release/git" \
          -p "semantic-release-replace-plugin@1.2.7" \
          semantic-release

    tasks:
      ci:
        help: run semantic release on CI
        run: ${{ env.app }} --ci

      dry:
        help: run semantic release in dry-run mode
        run: |
          ${{ env.app }} --dry-run

  pgbackrest:
    tasks:
      render-conf:
        help: "Render the runtime pgBackRest config for dev|staging|prod"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "[EE] Invalid --profile '$PROFILE' (use dev|staging|prod)." >&2
              exit 2
              ;;
          esac

          set -a
          source .envs/.env
          set +a

          : "${PSQL_USER:?PSQL_USER is required in .envs/.env}"

          OUTPUT_PATH=".runtime/pgbackrest/pgbackrest-${PROFILE}.conf"

          python containers/pgbackrest/render_config.py \
            --template containers/pgbackrest/pgbackrest.conf.template \
            --output "$OUTPUT_PATH" \
            --stanza "$PROFILE" \
            --repo-path /var/lib/pgbackrest \
            --pg-user "$PSQL_USER" \
            --retention-full "${PGBACKREST_RETENTION_FULL:-2}" \
            --process-max "${PGBACKREST_PROCESS_MAX:-2}"

          echo "$OUTPUT_PATH"

      render-restore-conf:
        help: "Render the temporary restore config for restoring prod into staging"
        run: |
          set -euo pipefail

          set -a
          source .envs/.env
          set +a

          : "${PSQL_USER:?PSQL_USER is required in .envs/.env}"

          if [ "${ENV:-}" != "staging" ]; then
            echo "[EE] .envs/.env must resolve to ENV=staging for restore rendering." >&2
            exit 2
          fi

          OUTPUT_PATH=".runtime/pgbackrest/pgbackrest-restore-prod-to-staging.conf"

          python containers/pgbackrest/render_config.py \
            --template containers/pgbackrest/pgbackrest.conf.template \
            --output "$OUTPUT_PATH" \
            --stanza prod \
            --repo-path /var/lib/pgbackrest-source \
            --pg-user "$PSQL_USER" \
            --retention-full "${PGBACKREST_RETENTION_FULL:-2}" \
            --process-max "${PGBACKREST_RESTORE_PROCESS_MAX:-4}"

          echo "$OUTPUT_PATH"

      wait-postgres:
        help: "Wait until PostgreSQL accepts local connections"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "[EE] Invalid --profile '$PROFILE' (use dev|staging|prod)." >&2
              exit 2
              ;;
          esac

          COMPOSE_CMD=(
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file "containers/compose-${PROFILE}.yaml"
            --file containers/compose-pgbackrest.yaml
            --project-name "infodengue-${PROFILE}"
          )

          "${COMPOSE_CMD[@]}" exec -T postgres wait-for-postgres ready

      stanza-create:
        help: "Create a pgBackRest stanza for the selected profile"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "[EE] Invalid --profile '$PROFILE' (use dev|staging|prod)." >&2
              exit 2
              ;;
          esac

          COMPOSE_CMD=(
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file "containers/compose-${PROFILE}.yaml"
            --file containers/compose-pgbackrest.yaml
            --project-name "infodengue-${PROFILE}"
          )

          "${COMPOSE_CMD[@]}" exec -T pgbackrest sh -lc \
            "set -euo pipefail; pgbackrest --stanza='${PROFILE}' stanza-create"

      check:
        help: "Run pgBackRest check for the selected profile"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "[EE] Invalid --profile '$PROFILE' (use dev|staging|prod)." >&2
              exit 2
              ;;
          esac

          COMPOSE_CMD=(
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file "containers/compose-${PROFILE}.yaml"
            --file containers/compose-pgbackrest.yaml
            --project-name "infodengue-${PROFILE}"
          )

          "${COMPOSE_CMD[@]}" exec -T pgbackrest sh -lc \
            "set -euo pipefail; pgbackrest --stanza='${PROFILE}' check"

      bootstrap:
        help: "Render config, recreate postgres/pgbackrest, create stanza, and check it"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
        hooks:
          pre-run:
            - task: pgbackrest.render-conf
              args:
                profile: ${{ args.profile }}
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "[EE] Invalid --profile '$PROFILE' (use dev|staging|prod)." >&2
              exit 2
              ;;
          esac

          COMPOSE_CMD=(
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file "containers/compose-${PROFILE}.yaml"
            --file containers/compose-pgbackrest.yaml
            --project-name "infodengue-${PROFILE}"
          )

          "${COMPOSE_CMD[@]}" up -d --force-recreate postgres pgbackrest

          makim pgbackrest.wait-postgres --profile "$PROFILE"
          makim pgbackrest.stanza-create --profile "$PROFILE"
          makim pgbackrest.check --profile "$PROFILE"

          echo "[II] pgBackRest bootstrap completed for ${PROFILE}."

      backup-full:
        help: "Render config, verify stanza health, and run a full backup"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
        hooks:
          pre-run:
            - task: pgbackrest.render-conf
              args:
                profile: ${{ args.profile }}
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "[EE] Invalid --profile '$PROFILE' (use dev|staging|prod)." >&2
              exit 2
              ;;
          esac

          COMPOSE_CMD=(
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file "containers/compose-${PROFILE}.yaml"
            --file containers/compose-pgbackrest.yaml
            --project-name "infodengue-${PROFILE}"
          )

          "${COMPOSE_CMD[@]}" up -d --force-recreate postgres pgbackrest

          makim pgbackrest.wait-postgres --profile "$PROFILE"

          if ! "${COMPOSE_CMD[@]}" exec -T pgbackrest sh -lc \
            "pgbackrest --stanza='${PROFILE}' info >/dev/null 2>&1"; then
            echo "[EE] Stanza '${PROFILE}' does not exist. Run 'makim pgbackrest.bootstrap --profile ${PROFILE}' first." >&2
            exit 1
          fi

          makim pgbackrest.check --profile "$PROFILE"

          "${COMPOSE_CMD[@]}" exec -T pgbackrest sh -lc \
            "set -euo pipefail; \
            pgbackrest --stanza='${PROFILE}' --log-level-console=info --type=full backup; \
            pgbackrest --stanza='${PROFILE}' expire; \
            pgbackrest --stanza='${PROFILE}' info"

      backup-schedule-add:
        help: "Add one or more systemd user timers for pgBackRest backups"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
          on_calendar:
            help: "systemd OnCalendar expression(s). Use ';' to add multiple."
            type: string
            required: true
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"
          ON_CALENDAR_RAW="${{ args.on_calendar }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "Invalid --profile '$PROFILE' (use dev|staging|prod)" >&2
              exit 2
              ;;
          esac

          export SYSTEMD_PAGER=cat
          export SYSTEMD_LESS=

          REPO_ROOT="$(pwd -P)"
          MAKIM_BIN="$(command -v makim || true)"

          [[ -n "$MAKIM_BIN" ]] || {
            echo "makim not found in PATH (activate conda env first)" >&2
            exit 3
          }

          ENV_BIN_DIR="$(dirname "$MAKIM_BIN")"
          UNIT_DIR="${HOME}/.config/systemd/user"
          mkdir -p "$UNIT_DIR"

          SERVICE_TPL="${UNIT_DIR}/alertadengue-pgbackrest-backup@.service"

          SERVICE_TPL="$SERVICE_TPL" \
          REPO_ROOT="$REPO_ROOT" \
          ENV_BIN_DIR="$ENV_BIN_DIR" \
          MAKIM_BIN="$MAKIM_BIN" \
          python -c '
          from pathlib import Path
          import os
          import textwrap

          service_path = Path(os.environ["SERVICE_TPL"])
          repo_root = os.environ["REPO_ROOT"]
          env_bin_dir = os.environ["ENV_BIN_DIR"]
          makim_bin = os.environ["MAKIM_BIN"]

          content = textwrap.dedent(f"""
              [Unit]
              Description=Alertadengue pgBackRest backup via Makim (%i)

              [Service]
              Type=oneshot
              WorkingDirectory={repo_root}
              Environment=COMPOSE_MENU=false
              Environment=COMPOSE_INTERACTIVE_NO_CLI=1
              Environment=PATH={env_bin_dir}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              ExecStart=/usr/bin/bash -lc "{makim_bin} pgbackrest.backup-full --profile %i"

              [Install]
              WantedBy=default.target
          """).strip() + "\n"
          service_path.write_text(content)
          '

          systemctl --user daemon-reload

          echo "$ON_CALENDAR_RAW" | tr ';' '\n' | while IFS= read -r expr; do
            expr="$(echo "$expr" | xargs)"
            [[ -n "$expr" ]] || continue

            slug="$(echo "$expr" | tr -c 'A-Za-z0-9' '-' | tr -s '-' | sed 's/^-//; s/-$//')"
            slug="${slug:0:48}"

            TIMER_NAME="alertadengue-pgbackrest-backup-${PROFILE}-${slug}.timer"
            TIMER_PATH="${UNIT_DIR}/${TIMER_NAME}"

            TIMER_PATH="$TIMER_PATH" \
            PROFILE="$PROFILE" \
            EXPR="$expr" \
            python -c '
          from pathlib import Path
          import os
          import textwrap

          timer_path = Path(os.environ["TIMER_PATH"])
          profile = os.environ["PROFILE"]
          expr = os.environ["EXPR"]

          content = textwrap.dedent(f"""
              [Unit]
              Description=Alertadengue pgBackRest backup timer ({profile} - {expr})

              [Timer]
              OnCalendar={expr}
              Persistent=true
              Unit=alertadengue-pgbackrest-backup@{profile}.service

              [Install]
              WantedBy=timers.target
          """).strip() + "\n"
          timer_path.write_text(content)
          '

            systemctl --user daemon-reload
            systemctl --user enable --now "$TIMER_NAME"
            echo "Enabled: $TIMER_PATH"
          done

          echo
          systemctl --user list-timers --all --no-pager | grep 'alertadengue-pgbackrest-backup' || true

      backup-schedule-list:
        help: "List registered Alertadengue pgBackRest systemd user timers"
        run: |
          set -euo pipefail

          systemctl --user list-timers --all --no-pager | grep -E 'alertadengue-pgbackrest' || true

          echo
          echo "Systemd unit files in ~/.config/systemd/user/:"
          ls ~/.config/systemd/user/alertadengue-pgbackrest* 2>/dev/null || echo "(none)"

      backup-schedule-clean:
        help: "Disable and remove all alertadengue-pgbackrest systemd timers and services"
        run: |
          set -euo pipefail

          export SYSTEMD_PAGER=cat
          export SYSTEMD_LESS=

          UNIT_DIR="${HOME}/.config/systemd/user"

          echo "Stopping and disabling timers..."
          while IFS= read -r timer; do
            [[ -n "$timer" ]] || continue
            echo "Cleaning $timer..."
            systemctl --user disable --now "$timer" || true
          done < <(
            systemctl --user list-unit-files --no-pager 2>/dev/null \
              | awk '/alertadengue-pgbackrest.*\.timer/ {print $1}'
          )

          echo "Stopping template services..."
          systemctl --user stop "alertadengue-pgbackrest-backup@dev.service" 2>/dev/null || true
          systemctl --user stop "alertadengue-pgbackrest-backup@staging.service" 2>/dev/null || true
          systemctl --user stop "alertadengue-pgbackrest-backup@prod.service" 2>/dev/null || true

          echo "Removing unit files..."
          rm -f "${UNIT_DIR}"/alertadengue-pgbackrest-backup-*.timer
          rm -f "${UNIT_DIR}"/alertadengue-pgbackrest-backup@.timer
          rm -f "${UNIT_DIR}"/alertadengue-pgbackrest-backup@.service

          systemctl --user daemon-reload
          systemctl --user reset-failed || true

          echo "Cleanup complete."

      backup-schedule-logs:
        help: "Show latest logs for scheduled backups (dev|staging|prod)"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "Invalid --profile '$PROFILE' (use dev|staging|prod)" >&2
              exit 2
              ;;
          esac

          journalctl --user -u "alertadengue-pgbackrest-backup@${PROFILE}.service" -n 200 --no-pager

      restore-profile-backup:
        help: "Restore an explicit full backup label inside one environment after guarded preflight"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
          backup-set:
            help: "Explicit full backup label to restore"
            type: string
            required: true
          confirm:
            help: "Confirmation string. Must be RESTORE-PROFILE-BACKUP."
            type: string
            required: true
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"
          BACKUP_SET="${{ args.backup_set }}"
          CONFIRM="${{ args.confirm }}"
          PROJECT_NAME="infodengue-${PROFILE}"
          PHASE="initial validation"
          POSTGRES_STARTED=0

          cleanup_profile_restore() {
            status="$1"
            if [ "$status" -ne 0 ]; then
              echo "[EE] restore-profile-backup failed during phase: ${PHASE}" >&2
              if [ "${POSTGRES_STARTED}" -eq 1 ]; then
                "${COMPOSE_CMD[@]}" stop postgres pgbackrest || true
              fi
            fi
          }

          trap 'status=$?; cleanup_profile_restore "$status"; exit "$status"' EXIT

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "[EE] Invalid --profile '$PROFILE' (use dev|staging|prod)." >&2
              exit 2
              ;;
          esac

          set -a
          source .envs/.env
          set +a

          : "${HOST_PGDATA:?HOST_PGDATA is required}"

          case "$PROJECT_NAME" in
            "infodengue-${PROFILE}"*) ;;
            *)
              echo "[EE] Compose project name must start with infodengue-${PROFILE}." >&2
              exit 2
              ;;
          esac

          COMPOSE_CMD=(
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file "containers/compose-${PROFILE}.yaml"
            --file containers/compose-pgbackrest.yaml
            --project-name "${PROJECT_NAME}"
          )
          PROFILE_REPO_VOLUME="${PROJECT_NAME}_pgbackrest_repo"

          VALIDATED_INPUTS="$(
            python containers/pgbackrest/refresh_staging.py validate-profile-restore-inputs \
              --profile "$PROFILE" \
              --host-pgdata "$HOST_PGDATA" \
              --backup-set "$BACKUP_SET" \
              --confirm "$CONFIRM"
          )"

          PROFILE="$(printf '%s\n' "$VALIDATED_INPUTS" | awk -F= '/^PROFILE=/{print $2}')"
          HOST_PGDATA_CANON="$(printf '%s\n' "$VALIDATED_INPUTS" | awk -F= '/^HOST_PGDATA_CANON=/{print $2}')"
          BACKUP_SET="$(printf '%s\n' "$VALIDATED_INPUTS" | awk -F= '/^BACKUP_SET=/{print $2}')"

          PHASE="render profile config"
          makim pgbackrest.render-conf --profile "$PROFILE"
          CONFIG_PATH="$(realpath ".runtime/pgbackrest/pgbackrest-${PROFILE}.conf")"
          PG_IMAGE_ID="$("${COMPOSE_CMD[@]}" images -q pgbackrest | awk 'NF {print; exit}')"
          if [ -z "$PG_IMAGE_ID" ]; then
            echo "[EE] Unable to determine the pgBackRest image for ${PROFILE}." >&2
            exit 2
          fi
          PROFILE_REPO_MOUNTPOINT="$(docker volume inspect "${PROFILE_REPO_VOLUME}" --format '{{ .Mountpoint }}')"

          PHASE="preflight repository metadata"
          PRECHECK_INFO_JSON="$(
            docker run --rm \
              --mount "type=bind,src=${PROFILE_REPO_MOUNTPOINT},dst=/var/lib/pgbackrest,readonly" \
              --mount "type=bind,src=${CONFIG_PATH},dst=/etc/pgbackrest/pgbackrest.conf,readonly" \
              "$PG_IMAGE_ID" \
              pgbackrest --stanza="$PROFILE" --output=json info
          )"

          SOURCE_BACKUP_INFO="$(
            printf '%s\n' "$PRECHECK_INFO_JSON" | \
              python containers/pgbackrest/refresh_staging.py validate-pgbackrest-info \
                --stanza "$PROFILE" \
                --backup-set "$BACKUP_SET"
          )"
          SOURCE_BACKUP_DB_SIZE="$(printf '%s\n' "$SOURCE_BACKUP_INFO" | awk -F= '/^SOURCE_BACKUP_DB_SIZE=/{print $2}')"

          echo "[II] Canonical PGDATA deletion target: ${HOST_PGDATA_CANON}"
          echo "[II] Selected ${PROFILE} backup label: ${BACKUP_SET}"
          echo "[II] Selected ${PROFILE} backup size: ${SOURCE_BACKUP_DB_SIZE} bytes"

          PHASE="stop profile services"
          "${COMPOSE_CMD[@]}" stop postgres pgbackrest || true
          "${COMPOSE_CMD[@]}" rm -f -s postgres pgbackrest || true

          PHASE="clean guarded pgdata"
          sudo mkdir -p "$HOST_PGDATA_CANON"
          sudo find "$HOST_PGDATA_CANON" -mindepth 1 -delete
          HOST_UID="${HOST_UID:-$(id -u)}"
          HOST_GID="${HOST_GID:-$(id -g)}"
          sudo chown "$HOST_UID:$HOST_GID" "$HOST_PGDATA_CANON"
          sudo chmod 0700 "$HOST_PGDATA_CANON"

          PHASE="run pgbackrest restore"
          env PGBACKREST_BACKUP_SET="$BACKUP_SET" PGBACKREST_STANZA="$PROFILE" \
            "${COMPOSE_CMD[@]}" run --rm --no-deps pgbackrest sh -lc \
              'set -euo pipefail; pgbackrest --stanza="$PGBACKREST_STANZA" --set="$PGBACKREST_BACKUP_SET" --archive-mode=off restore'

          PHASE="start restored postgres"
          "${COMPOSE_CMD[@]}" up -d --force-recreate postgres
          POSTGRES_STARTED=1

          PHASE="wait for postgres readiness"
          "${COMPOSE_CMD[@]}" exec -T postgres env TIMEOUT_SECONDS=180 \
            wait-for-postgres ready
          PHASE="wait for recovery completion"
          "${COMPOSE_CMD[@]}" exec -T postgres env TIMEOUT_SECONDS=240 \
            wait-for-postgres recovery-complete

          PHASE="validate restored database"
          VALIDATION_OUTPUT=$("${COMPOSE_CMD[@]}" exec -T postgres bash -lc '
            set -euo pipefail
            data_dir=$(psql -tA -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT current_setting('\''data_directory'\'');")
            db_size=$(psql -tA -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT pg_database_size(current_database());")
            municipio_exists=$(psql -tA -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT to_regclass('\''\"Dengue_global\".\"Municipio\"'\'') IS NOT NULL;")
            in_recovery=$(psql -tA -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT pg_is_in_recovery();")
            printf "DATA_DIR=%s\nDB_SIZE=%s\nMUNICIPIO_EXISTS=%s\nIN_RECOVERY=%s\n" "$data_dir" "$db_size" "$municipio_exists" "$in_recovery"
          ')

          DATA_DIR="$(printf '%s\n' "$VALIDATION_OUTPUT" | awk -F= '/^DATA_DIR=/{print $2}')"
          DB_SIZE="$(printf '%s\n' "$VALIDATION_OUTPUT" | awk -F= '/^DB_SIZE=/{print $2}')"
          MUNICIPIO_EXISTS="$(printf '%s\n' "$VALIDATION_OUTPUT" | awk -F= '/^MUNICIPIO_EXISTS=/{print $2}')"
          IN_RECOVERY="$(printf '%s\n' "$VALIDATION_OUTPUT" | awk -F= '/^IN_RECOVERY=/{print $2}')"

          python containers/pgbackrest/refresh_staging.py validate-restore \
            --source-db-size "$SOURCE_BACKUP_DB_SIZE" \
            --data-directory "$DATA_DIR" \
            --db-size "$DB_SIZE" \
            --relation-exists "$MUNICIPIO_EXISTS" \
            --in-recovery "$IN_RECOVERY"

          trap - EXIT
          echo "[II] Restore finished for ${PROFILE}."

      refresh-staging-from-prod:
        help: "Refresh staging from an explicit production backup set mounted read-only"
        args:
          source-repo:
            help: "Absolute host path to the transferred production pgBackRest repository"
            type: string
            required: true
          backup-set:
            help: "Explicit prod backup set label to restore"
            type: string
            required: true
          confirm:
            help: "Confirmation string. Must be REFRESH-STAGING-FROM-PROD."
            type: string
            required: true
        run: |
          set -euo pipefail

          SOURCE_REPO="${{ args.source_repo }}"
          BACKUP_SET="${{ args.backup_set }}"
          CONFIRM="${{ args.confirm }}"
          PROFILE="staging"
          PROJECT_NAME="infodengue-staging"
          STAGING_REPO_VOLUME="infodengue-staging_pgbackrest_repo"
          RESTORE_CONFIG=".runtime/pgbackrest/pgbackrest-restore-prod-to-staging.conf"
          PHASE="initial validation"
          RESTORE_CONTAINERS_STARTED=0

          cleanup_restore_mode() {
            status="$1"
            if [ "$status" -ne 0 ]; then
              echo "[EE] refresh-staging-from-prod failed during phase: ${PHASE}" >&2
              if [ "${RESTORE_CONTAINERS_STARTED}" -eq 1 ]; then
                "${RESTORE_COMPOSE_CMD[@]}" stop postgres pgbackrest || true
              fi
            fi
          }

          trap 'status=$?; cleanup_restore_mode "$status"; exit "$status"' EXIT

          set -a
          source .envs/.env
          set +a

          if [ "${ENV:-}" != "staging" ]; then
            echo "[EE] .envs/.env must resolve to ENV=staging." >&2
            exit 2
          fi

          : "${HOST_PGDATA:?HOST_PGDATA is required}"

          VALIDATED_INPUTS="$(
            python containers/pgbackrest/refresh_staging.py validate-inputs \
              --source-repo "$SOURCE_REPO" \
              --host-pgdata "$HOST_PGDATA" \
              --backup-set "$BACKUP_SET" \
              --confirm "$CONFIRM"
          )"

          SOURCE_REPO_CANON="$(printf '%s\n' "$VALIDATED_INPUTS" | awk -F= '/^SOURCE_REPO_CANON=/{print $2}')"
          HOST_PGDATA_CANON="$(printf '%s\n' "$VALIDATED_INPUTS" | awk -F= '/^HOST_PGDATA_CANON=/{print $2}')"
          BACKUP_SET="$(printf '%s\n' "$VALIDATED_INPUTS" | awk -F= '/^BACKUP_SET=/{print $2}')"

          COMPOSE_CMD=(
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file containers/compose-staging.yaml
            --file containers/compose-pgbackrest.yaml
            --project-name "${PROJECT_NAME}"
          )

          RESTORE_COMPOSE_CMD=(
            env
            "PGBACKREST_SOURCE_REPO=${SOURCE_REPO_CANON}"
            "PGBACKREST_CONFIG_FILE=../${RESTORE_CONFIG}"
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file containers/compose-staging.yaml
            --file containers/compose-pgbackrest.yaml
            --file containers/compose-pgbackrest-restore.yaml
            --project-name "${PROJECT_NAME}"
          )

          PHASE="render restore config"
          makim pgbackrest.render-restore-conf

          PHASE="preflight source repository"
          PRECHECK_INFO_JSON="$(
            "${RESTORE_COMPOSE_CMD[@]}" run --rm --no-deps pgbackrest \
              pgbackrest --stanza=prod --output=json info
          )"

          SOURCE_BACKUP_INFO="$(
            printf '%s\n' "$PRECHECK_INFO_JSON" | \
              python containers/pgbackrest/refresh_staging.py validate-pgbackrest-info \
                --stanza prod \
                --backup-set "$BACKUP_SET"
          )"
          SOURCE_BACKUP_DB_SIZE="$(printf '%s\n' "$SOURCE_BACKUP_INFO" | awk -F= '/^SOURCE_BACKUP_DB_SIZE=/{print $2}')"

          echo "[II] Canonical source repository: ${SOURCE_REPO_CANON}"
          echo "[II] Canonical staging PGDATA: ${HOST_PGDATA_CANON}"
          echo "[II] Selected source backup label: ${BACKUP_SET}"
          echo "[II] Selected source backup size: ${SOURCE_BACKUP_DB_SIZE} bytes"

          PHASE="stop staging services"
          "${COMPOSE_CMD[@]}" stop postgres pgbackrest || true
          "${COMPOSE_CMD[@]}" rm -f -s postgres pgbackrest || true

          PHASE="clean guarded staging pgdata"
          sudo mkdir -p "$HOST_PGDATA_CANON"
          sudo find "$HOST_PGDATA_CANON" -mindepth 1 -delete
          HOST_UID="${HOST_UID:-$(id -u)}"
          HOST_GID="${HOST_GID:-$(id -g)}"
          sudo chown "$HOST_UID:$HOST_GID" "$HOST_PGDATA_CANON"
          sudo chmod 0700 "$HOST_PGDATA_CANON"

          PHASE="validate staging repository volume"
          if docker volume ls --format '{{.Name}}' | grep -Fx "${STAGING_REPO_VOLUME}" >/dev/null; then
            docker volume inspect "${STAGING_REPO_VOLUME}" --format '{{ json .Labels }}' | \
              python containers/pgbackrest/refresh_staging.py validate-volume-labels
            PHASE="remove staging repository volume"
            docker volume rm "${STAGING_REPO_VOLUME}"
          fi

          PHASE="start restore-mode pgbackrest"
          RESTORE_CONTAINERS_STARTED=1
          "${RESTORE_COMPOSE_CMD[@]}" up -d --force-recreate pgbackrest

          PHASE="run pgbackrest restore"
          env PGBACKREST_BACKUP_SET="$BACKUP_SET" \
            "${RESTORE_COMPOSE_CMD[@]}" exec -T pgbackrest sh -lc \
              'set -euo pipefail; pgbackrest --stanza=prod --set="$PGBACKREST_BACKUP_SET" --archive-mode=off restore'

          PHASE="start restore-mode postgres"
          "${RESTORE_COMPOSE_CMD[@]}" up -d --force-recreate postgres

          PHASE="wait for restore-mode postgres readiness"
          "${RESTORE_COMPOSE_CMD[@]}" exec -T postgres env TIMEOUT_SECONDS=180 \
            wait-for-postgres ready

          PHASE="wait for restore recovery completion"
          "${RESTORE_COMPOSE_CMD[@]}" exec -T postgres env TIMEOUT_SECONDS=240 \
            wait-for-postgres recovery-complete

          PHASE="validate restored database"
          VALIDATION_OUTPUT=$("${RESTORE_COMPOSE_CMD[@]}" exec -T postgres bash -lc '
            set -euo pipefail
            data_dir=$(psql -tA -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT current_setting('\''data_directory'\'');")
            db_size=$(psql -tA -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT pg_database_size(current_database());")
            municipio_exists=$(psql -tA -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT to_regclass('\''\"Dengue_global\".\"Municipio\"'\'') IS NOT NULL;")
            in_recovery=$(psql -tA -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT pg_is_in_recovery();")
            printf "DATA_DIR=%s\nDB_SIZE=%s\nMUNICIPIO_EXISTS=%s\nIN_RECOVERY=%s\n" "$data_dir" "$db_size" "$municipio_exists" "$in_recovery"
          ')

          printf '%s\n' "$VALIDATION_OUTPUT"

          DATA_DIR=$(printf '%s\n' "$VALIDATION_OUTPUT" | awk -F= '/^DATA_DIR=/{print $2}')
          DB_SIZE=$(printf '%s\n' "$VALIDATION_OUTPUT" | awk -F= '/^DB_SIZE=/{print $2}')
          MUNICIPIO_EXISTS=$(printf '%s\n' "$VALIDATION_OUTPUT" | awk -F= '/^MUNICIPIO_EXISTS=/{print $2}')
          IN_RECOVERY=$(printf '%s\n' "$VALIDATION_OUTPUT" | awk -F= '/^IN_RECOVERY=/{print $2}')

          python containers/pgbackrest/refresh_staging.py validate-restore \
            --source-db-size "$SOURCE_BACKUP_DB_SIZE" \
            --data-directory "$DATA_DIR" \
            --db-size "$DB_SIZE" \
            --relation-exists "$MUNICIPIO_EXISTS" \
            --in-recovery "$IN_RECOVERY"

          PHASE="stop restore-mode containers"
          "${RESTORE_COMPOSE_CMD[@]}" stop postgres pgbackrest || true
          RESTORE_CONTAINERS_STARTED=0

          PHASE="render staging config"
          makim pgbackrest.render-conf --profile staging

          PHASE="start staging services"
          "${COMPOSE_CMD[@]}" up -d --force-recreate postgres pgbackrest

          PHASE="wait for staging postgres readiness"
          makim pgbackrest.wait-postgres --profile staging
          PHASE="create staging stanza"
          makim pgbackrest.stanza-create --profile staging
          PHASE="check staging stanza"
          makim pgbackrest.check --profile staging

          PHASE="create final staging backup"
          "${COMPOSE_CMD[@]}" exec -T pgbackrest sh -lc \
            "set -euo pipefail; \
            pgbackrest --stanza=staging --log-level-console=info --type=full backup; \
            pgbackrest --stanza=staging info"

          FINAL_BACKUP_LABEL=$("${COMPOSE_CMD[@]}" exec -T pgbackrest sh -lc \
            "pgbackrest --stanza=staging info" | awk '/full backup:/ {label=$3} END {print label}')

          if [ -z "$FINAL_BACKUP_LABEL" ]; then
            echo "[EE] Unable to determine the final staging backup label." >&2
            exit 1
          fi

          trap - EXIT
          echo "[II] Final staging backup label: $FINAL_BACKUP_LABEL"

      smoke-test:
        help: "Validate that the restored database is writable without leaving permanent data behind"
        args:
          profile:
            help: "Target environment: dev|staging|prod"
            type: string
            required: true
        run: |
          set -euo pipefail

          PROFILE="${{ args.profile }}"

          case "$PROFILE" in
            dev|staging|prod) ;;
            *)
              echo "[EE] Invalid --profile '$PROFILE' (use dev|staging|prod)." >&2
              exit 2
              ;;
          esac

          COMPOSE_CMD=(
            docker compose
            --env-file .envs/.env
            --file containers/compose-base.yaml
            --file "containers/compose-${PROFILE}.yaml"
            --file containers/compose-pgbackrest.yaml
            --project-name "infodengue-${PROFILE}"
          )

          "${COMPOSE_CMD[@]}" up -d postgres

          "${COMPOSE_CMD[@]}" exec -T postgres bash -lc '
              set -euo pipefail
              env TIMEOUT_SECONDS=60 wait-for-postgres ready
              env TIMEOUT_SECONDS=60 wait-for-postgres recovery-complete
              psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "BEGIN; CREATE TEMP TABLE makim_pgbackrest_smoke_test (id integer); INSERT INTO makim_pgbackrest_smoke_test VALUES (1); SELECT count(*) AS rows FROM makim_pgbackrest_smoke_test; ROLLBACK;"
          '
