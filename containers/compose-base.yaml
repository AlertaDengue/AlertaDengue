services:
  memcached:
    image: memcached:alpine
    command:
      - memcached
      - -m
      - "64"
      - -U
      - "0"
    expose:
      - "11211"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "11211"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - infodengue

  rabbitmq:
    image: rabbitmq:3-alpine
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5672"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - infodengue

  redis:
    platform: linux/amd64
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - redis-data:/data
    networks:
      - infodengue

  postgres:
    hostname: postgres
    restart: unless-stopped
    build:
      context: ".."
      dockerfile: "containers/postgres/Dockerfile"
      args:
        HOST_UID: "${HOST_UID}"
        HOST_GID: "${HOST_GID}"
        ENV: "${ENV}"
    env_file:
      - ../.envs/.env
    shm_size: "8gb"
    environment:
      POSTGRES_PASSWORD: "${PSQL_PASSWORD}"
      POSTGRES_DB: "${PSQL_DB}"
      POSTGRES_USER: "${PSQL_USER}"
      POSTGRES_HOST_AUTH_METHOD: "md5"
      PG_RESTORE_STAGING: "${PG_RESTORE_STAGING}"
      PGDATA: /var/lib/postgresql/data
    ports:
      - "${PSQL_PORT}:5432"
    volumes:
      - ${HOST_PGDATA}:/var/lib/postgresql/data
      - pgsocket:/var/run/postgresql
      - ../containers/postgres/setup/:/docker-entrypoint-initdb.d/
      - ../containers/postgres/dumps/:/dumps/
      - pgbackrest_repo:/var/lib/pgbackrest
      - pgbackrest_logs:/var/log/pgbackrest
    command:
      - postgres
      - -p
      - "5432"
      - -c
      - "unix_socket_directories=/var/run/postgresql"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h /var/run/postgresql -p 5432 -U ${PSQL_USER} -d ${PSQL_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infodengue


  base:
    build:
      context: ".."
      dockerfile: "containers/web/Dockerfile"
      args:
        HOST_UID: "${HOST_UID}"
        HOST_GID: "${HOST_GID}"
        ENV: "${ENV}"
    env_file:
      - ../.envs/.env
    environment:
      MEMCACHED_HOST: "memcached"
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672"
      PSQL_HOST: "postgres"
      PSQL_PORT: "5432"
    volumes:
      - "${DOCKER_HOST_SINAN_ROOT}:/opt/services/ingestion/sinan"
      - "${DOCKER_HOST_IMPORTED_FILES_DIR}:/opt/services/ingestion/sinan/imported"
      # - "${DOCKER_HOST_SHAPEFILES_DIR}:/srv/deploy/shapefile"
    user: "${HOST_UID}:${HOST_GID}"

  web:
    extends: base
    hostname: web
    environment:
      DJANGO_PORT: "${DJANGO_PORT}"
      DJANGO_SETTINGS_MODULE: "ad_main.settings.${ENV}"
      DEBUG: "${DEBUG}"
      MAINTENANCE_MODE: "${MAINTENANCE_MODE}"
    env_file:
      - ../.envs/.env
    ports:
      - "${DJANGO_PORT}:8000"
    entrypoint: ["bash", "/opt/entrypoint.sh"]
    depends_on:
      memcached:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 40s
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8000/status/ || exit 1",
        ]
    networks:
      - infodengue

  celery:
    extends: base
    hostname: celery
    entrypoint: ["bash", "/opt/entrypoint.sh", "/opt/runcelery.sh"]
    env_file:
      - ../.envs/.env
    environment:
      DJANGO_SETTINGS_MODULE: "ad_main.settings.${ENV}"
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
      CELERY_WORKER_POOL: ${CELERY_WORKER_POOL:-prefork}
      CELERY_LOGLEVEL: ${CELERY_LOGLEVEL:-INFO}
    volumes:
      - ${DOCKER_HOST_IMPORTED_FILES_DIR}:/opt/services/ingestion/sinan/imported
      - ${EPISCANNER_HOST_DIR}:/opt/services/episcanner
    user: ${HOST_UID}:${HOST_GID}
    depends_on:
      memcached:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - infodengue
    healthcheck:
        test: ["CMD-SHELL", "celery -A ad_main.celeryapp:app inspect ping --destination celery@$$HOSTNAME | grep -q OK"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 10s

  celery-beat:
    extends: base
    hostname: celery-beat
    entrypoint: ["bash", "/opt/entrypoint.sh", "/opt/runbeat.sh"]
    env_file:
      - ../.envs/.env
    environment:
      DJANGO_SETTINGS_MODULE: "ad_main.settings.${ENV}"
      CELERY_LOGLEVEL: ${CELERY_LOGLEVEL:-INFO}
      CELERYBEAT_SCHEDULE: /tmp/celerybeat-schedule
    volumes:
      - ${DOCKER_HOST_IMPORTED_FILES_DIR}:/opt/services/ingestion/sinan/imported
      - ${EPISCANNER_HOST_DIR}:/opt/services/episcanner
    user: ${HOST_UID}:${HOST_GID}
    depends_on:
      memcached:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - infodengue
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q 'celery.*beat'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


volumes:
  redis-data:
  pgsocket:
  pgbackrest_repo:
  pgbackrest_logs:

networks:
  infodengue:
    driver: bridge
