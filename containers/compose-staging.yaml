services:
  postgres:
    environment:
      PGDATA: "/var/lib/postgresql/data"
    ports:
      - "${PSQL_HOST_PORT}:5432"
    volumes:
      - "${HOST_PGDATA:-/opt/data/infodengue/staging/pgdata}:/var/lib/postgresql/data"
    command:
      - postgres
      - -p
      - "5432"
      - -c
      - "unix_socket_directories=/var/run/postgresql"
      - -c
      - "max_worker_processes=8"
      - -c
      - "archive_mode=off"

  web:
    command: bash /opt/runwsgi.sh
    environment:
      DJANGO_SETTINGS_MODULE: "ad_main.settings.staging"
      ENV: "staging"
      DEBUG: "False"
      DJANGO_PORT: "8000"

  celery:
    command: bash /opt/runcelery.sh
    environment:
      DJANGO_SETTINGS_MODULE: "ad_main.settings.staging"
      ENV: "staging"
      DEBUG: "False"
