backend: compose
env-file: .envs/.env

defaults:
  profile: ${{ env.ENV }}
  project-name: infodengue-${{ env.ENV }}

profiles:
  dev:
    project-name: infodengue-dev
    env-file: .envs/.env
    config-path:
      - containers/compose-base.yaml
      - containers/compose-dev.yaml
      - containers/compose-pgbackrest.yaml
      - containers/compose-nextjs.yaml
    services:
      default:
        - frontend
        - postgres
        - memcached
        - rabbitmq
        - redis
        - web
        - celery
        - celery-beat
      available:
        - name: frontend
        - name: postgres
        - name: memcached
        - name: rabbitmq
        - name: redis
        - name: web
        - name: celery
        - name: celery-beat
        - name: pgbackrest

  staging:
    project-name: infodengue-staging
    env-file: .envs/.env
    config-path:
      - containers/compose-base.yaml
      - containers/compose-staging.yaml
      - containers/compose-minio.yaml
      - containers/compose-pgbackrest.yaml
    services:
      default:
        - postgres
        - memcached
        - rabbitmq
        - redis
        - web
        - celery
        - celery-beat
      available:
        - name: postgres
        - name: memcached
        - name: rabbitmq
        - name: redis
        - name: web
        - name: celery
        - name: celery-beat
        - name: minio
        - name: minio-init
        - name: minio-materializer
        - name: pgbackrest

  prod:
    project-name: infodengue-prod
    env-file: .envs/.env
    config-path:
      - containers/compose-base.yaml
      - containers/compose-prod.yaml
      - containers/compose-minio.yaml
      - containers/compose-pgbackrest.yaml
    services:
      default:
        - postgres
        - memcached
        - rabbitmq
        - redis
        - web
        - celery
        - celery-beat
      available:
        - name: postgres
        - name: memcached
        - name: rabbitmq
        - name: redis
        - name: web
        - name: celery
        - name: celery-beat
        - name: minio
        - name: minio-init
        - name: minio-materializer
        - name: pgbackrest
