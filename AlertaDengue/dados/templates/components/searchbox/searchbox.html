{% load i18n %}
{% block searchbox_component %}
<select
  class="form-control js-select2 site-searchbox"
  id="searchbox"
  aria-label="{% translate 'Buscar município' %}"
  data-placeholder="{% blocktranslate %}Encontre um município{% endblocktranslate %}">
  <option></option>
  {% for city in options_cities %}
    <option value="{{ city.geocode }}">{{ city.name }} - {{ city.state }}</option>
  {% endfor %}
</select>
{% endblock %}
