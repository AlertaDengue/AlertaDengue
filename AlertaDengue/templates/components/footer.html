{% load i18n %}
{% load static %}

<div class="row site-footer-grid align-items-center text-center text-lg-left">
  <div class="col-12 col-lg-2 mb-4 mb-lg-0 d-flex justify-content-center justify-content-lg-start">
    <img
        src="{% static '/img/logo-infodengue.png' %}"
        alt="{% trans 'Infodengue Logo' %}"
        class="footer-logo">
  </div>

  <div class="col-12 col-lg-7 mb-4 mb-lg-0">
    <p class="mb-0 site-footer__description">
      {% trans "A organização Infodengue reúne epidemiologistas, cientistas de dados e estudantes, que atuam em parceria com os órgãos governamentais de Saúde para ajudar a gestão de doenças transmitidas por mosquitos como dengue, chikungunya e Zika." %}
    </p>
  </div>

  <div class="col-12 col-lg-3 d-flex justify-content-center justify-content-lg-end">
    <a
        href="https://github.com/sponsors/AlertaDengue?o=esc"
        target="_blank"
        rel="noopener noreferrer"
        class="btn site-footer__sponsor"
        aria-label="{% trans 'Apoie o projeto Infodengue no GitHub Sponsors' %}">

      </svg>
      <span>Sponsor</span>
    </a>
  </div>
</div>
