{% load static %}
{% load i18n %}

<div class="site-header-inner">
  <div class="site-brand">
    <a href="/" class="site-brand__link" aria-label="{% trans 'Página inicial do Infodengue' %}">
      <img
          class="site-logo"
          src="{% static '/img/info-dengue-logo-multicidades.png' %}"
          alt="INFO-DENGUE">
    </a>
  </div>

  <div class="partner-logos" aria-label="{% trans 'Instituições parceiras' %}">
    <a
        href="https://emap.fgv.br/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="EMAp FGV">
      <img
          class="partner-logo"
          src="{% static '/img/emap.jpg' %}"
          alt="EMAP">
    </a>
    <a
        href="https://www.procc.fiocruz.br/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Fiocruz PROCC">
      <img
          class="partner-logo"
          src="{% static '/img/fiocruz.gif' %}"
          alt="FIOCRUZ">
    </a>
  </div>
</div>
